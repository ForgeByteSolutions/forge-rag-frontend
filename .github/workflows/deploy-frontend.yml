name: Deploy Frontend to S3

on:
  push:
    branches:
      - main          
    paths:
      - 'frontend/**' # only runs when frontend files change
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  build-and-deploy:
    name: Build & Deploy to S3
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # ── 4. Build Next.js static export ────────────────────────────────────────
      # NEXT_PUBLIC_API_BASE is injected at build time from GitHub Secrets
      - name: Build Next.js app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE: ${{ secrets.NEXT_PUBLIC_API_BASE }}
        run: npm run build
        # This produces the `out/` folder (static HTML/CSS/JS)

      # ── 5. Configure AWS credentials ──────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 6. Sync build output to S3 ────────────────────────────────────────────
      - name: Deploy to S3
        run: |
          aws s3 sync frontend/out/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"

          # HTML files: no cache (so users always get fresh pages)
          aws s3 sync frontend/out/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --include "*.html"

      # ── 7. Invalidate CloudFront cache ────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"


      # ── 8. Summary ────────────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "✅ Frontend deployed to s3://${{ secrets.S3_BUCKET_NAME }}"
          echo "🌐 Visit: http://${{ secrets.S3_BUCKET_NAME }}.s3-website.${{ secrets.AWS_REGION }}.amazonaws.com"
